<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Addictivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "forest-green": "var(--color-primary)",
              "forest-light": "var(--color-primary-light)",
              "warm-orange": "var(--color-secondary)",
              "light-orange": "var(--color-secondary-light)",
              "off-white": "var(--color-background)",
              "surface": "var(--color-surface)",
              "txt": "var(--color-text)",
              "txt-secondary": "var(--color-text-secondary)",
            },
            fontFamily: {
              "display": ["-apple-system", "BlinkMacSystemFont", "Inter", "sans-serif"]
            },
            fontSize: {
              "display": ["34px", { lineHeight: "1.2" }],
              "title": ["22px", { lineHeight: "1.3" }],
              "body": ["17px", { lineHeight: "1.4" }],
              "subhead": ["15px", { lineHeight: "1.4" }],
              "caption": ["13px", { lineHeight: "1.3" }],
              "overline": ["11px", { lineHeight: "1.2" }]
            },
            borderRadius: {
              "xl": "0.875rem",
              "2xl": "1.25rem",
              "3xl": "1.5rem"
            },
            boxShadow: {
              'soft': '0 2px 12px -2px rgba(0, 0, 0, 0.06)',
              'nav': '0 -2px 16px rgba(0,0,0,0.08)',
              'card': '0 1px 4px rgba(0, 0, 0, 0.04)'
            }
          },
        },
      }
    </script>
    <style>
      body { background-color: var(--color-background); overflow: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      html { padding: 0 env(safe-area-inset-right) 0 env(safe-area-inset-left); }
      :root {
        /* Default fallback (Classic Forest) */
        --color-primary: #3a6b46;
        --color-primary-light: #3a6b4620;
        --color-secondary: #e89635;
        --color-secondary-light: #e8963520;
        --color-background: #f8f9fa;
        --color-surface: #ffffff;
        --color-text: #744b1a;
        --color-text-secondary: #744b1a99;
      }
      .bottom-nav-curve {
          border-top-left-radius: 2.5rem;
          border-top-right-radius: 2.5rem;
          border-bottom-left-radius: 2.5rem;
          border-bottom-right-radius: 2.5rem;
      }
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      @keyframes reward-float {
        0% { transform: translateY(0) scale(0.9); opacity: 0; }
        15% { transform: translateY(-8px) scale(1); opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateY(-48px); opacity: 0; }
      }
      .animate-reward-float {
        animation: reward-float 2.5s ease-out forwards;
      }
      @keyframes view-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes view-slide-up {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-view-fade { animation: view-fade-in 0.25s ease-out forwards; }
      .animate-view-slide { animation: view-slide-up 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="text-txt font-display min-h-screen">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
